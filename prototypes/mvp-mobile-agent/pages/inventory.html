<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>车源匹配</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/prototype.css">
</head>
<body>
  <div class="app-shell">
    <div class="island"></div>
    <div class="status-bar"><span>9:41</span><span class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></span></div>
    <div class="nav-bar"><div><div class="nav-title">车源匹配</div><div class="nav-subtitle">销售承接 · C 级前置复核</div></div><div class="nav-action"><i class="fa-solid fa-car-side"></i></div></div>
    <main class="content">
      <section class="hero-card">
        <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=900&q=80" alt="vehicle inventory">
        <div class="hero-overlay"><div class="hero-eyebrow">库存车 · 准新车 · 二手车</div><div><div class="hero-title">3 台可用于初步沟通</div><div class="hero-desc">报价前需确认价格有效期、出口手续和合规状态。</div></div></div>
      </section>
      <section class="metric-row">
        <div class="metric-card"><strong>18</strong><span>可展示车源</span></div>
        <div class="metric-card"><strong class="text-emerald-700">9</strong><span>出口就绪</span></div>
        <div class="metric-card"><strong class="text-amber-700">4</strong><span>价格待确认</span></div>
      </section>
      <section class="list">
        <article class="lead-card"><div class="lead-top"><div><div class="lead-name">Toyota Camry 2021</div><div class="lead-meta">35,000 km · 黑色 · 可出口手续待复核</div></div><span class="tag green">匹配强</span></div><div class="evidence-box">适合客户公开库存中的日系 B 级轿车方向。不可承诺最终价，仅作为车型沟通样本。</div></article>
        <article class="lead-card"><div class="lead-top"><div><div class="lead-name">Honda CR-V 2020</div><div class="lead-meta">42,000 km · 白色 · 图片/视频完整</div></div><span class="tag blue">可发送</span></div></article>
        <article class="lead-card"><div class="lead-top"><div><div class="lead-name">Nissan X-Trail 2019</div><div class="lead-meta">价格有效期 48 小时 · 需销售确认</div></div><span class="tag amber">待确认</span></div></article>
      </section>
    </main>
    <nav class="tabbar">
      <div class="tab"><i class="fa-solid fa-house"></i><span>首页</span></div>
      <div class="tab"><i class="fa-solid fa-filter-circle-dollar"></i><span>复核</span></div>
      <div class="tab"><i class="fa-solid fa-robot"></i><span>任务</span></div>
      <div class="tab active"><i class="fa-solid fa-chart-simple"></i><span>洞察</span></div>
      <div class="tab"><i class="fa-solid fa-shield-halved"></i><span>合规</span></div>
    </nav>
  </div>
</body>
</html>
